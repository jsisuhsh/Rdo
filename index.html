<!DOCTYPE html>
<html lang="ru">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
 <title>RedoGift App</title>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
 <style>
     :root {
         --bg-color: #1e1b24;
         --container-bg: #2d2836;
         --accent-color: #9d4edd;
         --green-color: #28a745;
         --text-color: #f3f0f7;
         --text-muted: #9a8c9e;
         --ton-blue: #0088cc;
         --pill-bg: rgba(255, 255, 255, 0.15);
     }

     * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-user-select: none; }
     body { background-color: var(--bg-color); color: var(--text-color); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

     #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #000; border: 2px solid var(--accent-color); color: white; padding: 12px 20px; border-radius: 10px; z-index: 20000; display: none; font-size: 14px; white-space: nowrap; }

     #online-counter { position: fixed; top: 15px; left: 15px; z-index: 10000; display: flex; align-items: center; gap: 6px; background: rgba(40, 167, 69, 0.2); border: 2px solid var(--green-color); padding: 5px 10px; border-radius: 50px; font-weight: bold; font-size: 14px; color: white; }
     .user-icon { width: 18px; height: 18px; color: var(--green-color); stroke: currentColor; fill: none; }

     .top-balance-box { position: fixed; top: 15px; right: 15px; display: flex; align-items: center; gap: 8px; background: var(--pill-bg); padding: 6px 14px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.1); z-index: 10000; }
     #balance-display { font-size: 18px; font-weight: 700; color: #ffffff !important; }
     .ton-icon-wrapper { width: 24px; height: 24px; background-color: var(--ton-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; }

     main { flex: 1; overflow-y: auto; padding: 20px; margin-top: 50px; position: relative; }
     .tab-content { display: none; }
     .tab-content.active { display: block; }
   
     .bg-characters { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('character.png'); background-size: 50px; opacity: 0.1; z-index: 0; pointer-events: none; }

     .profile-header { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; margin-top: 30px; }
     .avatar { width: 80px; height: 80px; background: #007bff; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; margin-bottom: 15px; }
     .profile-buttons { display: flex; gap: 10px; margin-top: 20px; width: 100%; max-width: 300px; }
     .btn { flex: 1; padding: 12px; border-radius: 30px; border: none; font-weight: 600; cursor: pointer; text-align: center; font-size: 14px; }
     .btn-fill { background-color: var(--accent-color); color: white; }
     .btn-outline { background-color: rgba(157, 78, 221, 0.2); border: 2px solid var(--accent-color); color: white; }
     .btn-blue { background-color: var(--ton-blue); color: white; }

     nav { height: 80px; background: var(--container-bg); border-top: 1px solid #3c354a; display: flex; justify-content: space-around; align-items: center; padding-bottom: 5px; }
     .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); cursor: pointer; padding: 5px; width: 33%; font-size: 13px; }
     .nav-item.active { color: var(--accent-color); }
     .nav-icon { margin-bottom: 2px; height: 24px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; }
     .nav-icon svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; }

     .nav-counter::after { content: "1x"; animation: countLoop 5s infinite steps(1); }
     @keyframes countLoop { 0%, 24.9% { content: "1x"; } 25%, 49.9% { content: "2x"; } 50%, 74.9% { content: "3x"; } 75%, 100% { content: "4x"; } }

     .crash-container { position: relative; background: var(--container-bg); border-radius: 15px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 380px; margin-top: 20px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); }
     #crash-canvas, #grid-canvas { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; }
     #grid-canvas { z-index: 0; }
     #crash-canvas { z-index: 1; }
     
     #countdown-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; font-weight: 800; color: #ffffff; z-index: 5; pointer-events: none; display: none; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
     @keyframes pop { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 0; } }
     .pop-anim { animation: pop 1s ease-out; }

     #settings-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--container-bg); z-index: 10; display: none; padding: 20px; flex-direction: column; gap: 20px; border-radius: 15px; }
     .setting-item { display: flex; justify-content: space-between; align-items: center; font-size: 16px; }
     .switch { width: 50px; height: 25px; background: #555; border-radius: 25px; position: relative; cursor: pointer; transition: 0.3s; }
     .switch.on { background: #4CAF50; }
     .switch::before { content: ""; position: absolute; top: 2px; left: 2px; width: 21px; height: 21px; background: white; border-radius: 50%; transition: 0.3s; }
     .switch.on::before { left: 27px; }
     
     .rocket-selector { display: flex; gap: 15px; margin-top: 15px; }
     .rocket-option { width: 70px; height: 70px; border: 2px solid transparent; border-radius: 12px; cursor: pointer; object-fit: contain; background: rgba(255, 255, 255, 0.05); transition: 0.3s; padding: 5px; }
     .rocket-option.active { border-color: var(--accent-color); background: rgba(157, 78, 221, 0.2); }

     .close-settings { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; color: white; }
     .crash-settings-icon { position: absolute; top: 15px; right: 15px; font-size: 18px; z-index: 3; cursor: pointer; background: rgba(157, 78, 221, 0.3); padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
     .crash-info { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; pointer-events: none; width: 100%; }
     
     .rocket-gif { width: 200px; height: auto; flex-shrink: 0; object-fit: contain; visibility: hidden; margin-bottom: 10px; will-change: transform; image-rendering: -webkit-optimize-contrast; }
     #crash-status { margin-top: 25px; }
     #crash-multiplier { font-size: 52px; font-weight: 800; color: #fff; margin-bottom: 10px; }

     .crash-history-container { display: flex; gap: 6px; overflow-x: auto; overflow-y: hidden; justify-content: flex-start; margin-top: 10px; width: 100%; max-width: 95%; padding-bottom: 5px; white-space: nowrap; }
     .history-item { background-color: #161d31; border: 2px solid var(--accent-color); color: #ffffff; padding: 4px 12px; border-radius: 50px; font-size: 13px; font-weight: 700; white-space: nowrap; transition: all 0.3s ease; }

     .bet-container { width: 100%; max-width: 350px; display: flex; gap: 8px; margin-top: 15px; margin-left: auto; margin-right: auto; }
     .bet-input { flex: 1; background: var(--pill-bg); border: none; padding: 8px 12px; border-radius: 20px; color: white; font-size: 14px; text-align: center; }
     .bet-btn { background: var(--accent-color); border: none; padding: 8px 18px; border-radius: 20px; color: white; font-weight: bold; font-size: 14px; cursor: pointer; display: inline-block; }
     .bet-btn.cashout { background: var(--green-color); }
     .bet-btn:disabled { background: #555; cursor: not-allowed; opacity: 0.6; }

     .bets-list { width: 100%; max-width: 350px; margin: 15px auto 0 auto; background: var(--container-bg); border-radius: 15px; padding: 12px; border: 1px solid rgba(255, 255, 255, 0.05); }
     .bet-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
     .bet-row:last-child { border-bottom: none; }
     .bet-row.current-user { background: rgba(157, 78, 221, 0.12); border-radius: 10px; padding: 8px; margin-bottom: 4px; }
     .bet-user-meta { display: flex; align-items: center; }
     .bet-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent-color); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; margin-right: 12px; }
     .bet-info { display: flex; flex-direction: column; }
     .bet-username { font-size: 14px; font-weight: 600; color: var(--text-color); }
     .bet-amount-val { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
     .bet-live-payout { font-size: 14px; font-weight: 700; color: var(--text-muted); text-align: right; }
     
     #promo-overlay { position: fixed; bottom: -50vh; left: 0; width: 100%; height: 50vh; background: var(--container-bg); z-index: 20000; border-top-left-radius: 25px; border-top-right-radius: 25px; border: 1px solid rgba(255,255,255,0.1); padding: 25px; transition: bottom 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
     #promo-overlay.visible { bottom: 0; }
     #promo-overlay h3 { margin-bottom: 20px; text-align: center; }
 </style>
</head>
<body>

 <div id="toast"></div>

 <div id="online-counter">
     <svg class="user-icon" viewBox="0 0 24 24" width="18" height="18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
         <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
         <circle cx="12" cy="7" r="4"></circle>
     </svg>
     <span id="online-count">0</span>
 </div>

 <div class="top-balance-box">
     <span id="balance-display">100.00</span>
     <div class="ton-icon-wrapper">
         <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M4 6h16l-8 13z"></path><line x1="12" y1="6" x2="12" y2="19"></line></svg>
     </div>
 </div>

 <main>
     <div id="tab-cases" class="tab-content active"><h2>Кейсы</h2></div>
     <div id="tab-crash" class="tab-content">
         <h2>Краш</h2>
         <div class="crash-container">
             <div id="settings-menu">
                 <div class="close-settings" onclick="hideSettings()">✕</div>
                 <div style="margin-top: 40px;">
                     <div class="setting-item">Вывод при плохом соединении <div id="bad-conn-switch" class="switch" onclick="toggle(this)"></div></div>
                     
                     <div style="margin-top: 25px; font-size: 16px;">Выбор ракетки:</div>
                     <div class="rocket-selector">
                         <img src="https://i.postimg.cc/PxbfNvqk/animation-gif-ezgif-com-effects.gif" class="rocket-option" onclick="selectRocket(0)" alt="Новая ракета">
                         <img src="https://i.postimg.cc/4ynpR8m1/lv-0-20260527162334-ezgif-com-effects.gif" class="rocket-option" onclick="selectRocket(1)" alt="Старая ракета">
                     </div>
                 </div>
             </div>
             <div class="crash-settings-icon" onclick="showSettings()">⚙️</div>
             <canvas id="grid-canvas"></canvas>
             <canvas id="crash-canvas"></canvas>
             <div id="countdown-overlay"></div>
             <div class="crash-info">
                 <img id="rocket-animation" src="https://i.postimg.cc/PxbfNvqk/animation-gif-ezgif-com-effects.gif" class="rocket-gif" alt="Rocket">
                 <div id="crash-status">Ожидание...</div>
                 <div id="crash-multiplier">1.00x</div>
                 <div id="crash-history" class="crash-history-container"></div>
             </div>
         </div>
         <div class="bet-container">
             <input type="number" id="bet-amount" class="bet-input" placeholder="0.00 TON">
             <button id="bet-btn" class="bet-btn" onclick="processBetAction()">Поставить</button>
         </div>

         <div class="bets-list" id="bets-list-container">
             <div class="bet-row current-user">
                 <div class="bet-user-meta">
                     <div id="user-bet-avatar" class="bet-avatar">?</div>
                     <div class="bet-info">
                         <div id="user-bet-username" class="bet-username">@Загру...</div>
                         <div id="user-bet-amount" class="bet-amount-val">0.00 TON</div>
                     </div>
                 </div>
                 <div id="user-bet-payout" class="bet-live-payout">0.00 TON</div>
             </div>
         </div>
     </div>
     <div id="tab-profile" class="tab-content">
         <div class="bg-characters"></div>
         <div class="profile-header">
             <div id="user-avatar" class="avatar">?</div>
             <div id="username-display" style="font-size: 20px; font-weight: 600; margin-bottom: 5px;">Загрузка...</div>
             <div class="profile-buttons">
                 <button class="btn btn-fill">Пополнить</button>
                 <button class="btn btn-outline">Награды</button>
             </div>
             <button class="btn btn-blue" style="width: 300px; margin-top: 10px;" onclick="showPromo()">Активировать промокод</button>
         </div>
     </div>
 </main>

 <div id="promo-overlay">
     <div style="text-align: right; cursor: pointer; margin-bottom: 10px;" onclick="hidePromo()">✕</div>
     <h3>Введите промокод</h3>
     <input type="text" id="promo-input" class="bet-input" placeholder="Ваш код" style="width: 100%; margin-bottom: 20px; border: 1px solid var(--accent-color);">
     <button class="btn btn-fill" style="width: 100%;" onclick="activatePromoCode()">Активировать</button>
 </div>

 <nav>
     <div class="nav-item active" data-target="tab-cases"><span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg></span>Кейсы</div>
     <div class="nav-item" data-target="tab-crash"><span class="nav-icon"><span class="nav-counter"></span></span>Краш</div>
     <div class="nav-item" data-target="tab-profile"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></span>Профиль</div>
 </nav>

 <script src="https://telegram.org/js/telegram-web-app.js"></script>
 <script>
     // === ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ===
     function showToast(text) {
         const toast = document.getElementById('toast');
         toast.innerText = text;
         toast.style.display = 'block';
         setTimeout(() => { toast.style.display = 'none'; }, 2500);
     }
     
     function showPromo() { document.getElementById('promo-overlay').classList.add('visible'); }
     function hidePromo() { document.getElementById('promo-overlay').classList.remove('visible'); }
     
     function activatePromoCode() { 
         const input = document.getElementById('promo-input').value.trim();
         const code = input.toLowerCase();
         if (!code) { showToast("Введите код!"); return; }
         if (code === "vadimka") {
             let usedUsers = JSON.parse(localStorage.getItem('promo_vadimka_users') || '[]');
             let usageCount = parseInt(localStorage.getItem('promo_vadimka_count') || 0);
             if (usageCount >= 2) { showToast("Промокод закончился!"); } 
             else if (usedUsers.includes(rawUsername)) { showToast("Вы уже активировали этот промокод!"); } 
             else {
                 usageCount++;
                 usedUsers.push(rawUsername);
                 localStorage.setItem('promo_vadimka_count', usageCount);
                 localStorage.setItem('promo_vadimka_users', JSON.stringify(usedUsers));
                 balance += 50;
                 localStorage.setItem('user_balance', balance.toFixed(2));
                 document.getElementById('balance-display').innerText = balance.toFixed(2);
                 showToast("Промокод активирован! +50 TON");
             }
         } else { showToast("Такой промокод не существует"); }
         document.getElementById('promo-input').value = "";
         hidePromo();
     }

     function showSettings() { document.getElementById('settings-menu').style.display = 'flex'; }
     function hideSettings() { document.getElementById('settings-menu').style.display = 'none'; }
     function toggle(el) { el.classList.toggle('on'); }

     // === ИНИЦИАЛИЗАЦИЯ ПОЛЬЗОВАТЕЛЯ И ДАННЫХ ===
     const tg = window.Telegram.WebApp;
     tg.expand();

     let rawUsername = "Гость";
     let userLetter = "?";
     if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
         const user = tg.initDataUnsafe.user;
         rawUsername = user.username ? user.username : user.first_name;
         userLetter = (user.username ? user.username[0] : user.first_name[0]).toUpperCase();
         document.getElementById('username-display').innerText = user.username ? '@' + user.username : user.first_name;
         document.getElementById('user-avatar').innerText = userLetter;
     } else {
         document.getElementById('username-display').innerText = "Гость";
         document.getElementById('user-avatar').innerText = "?";
     }
     document.getElementById('user-bet-avatar').innerText = userLetter;
     document.getElementById('user-bet-username').innerText = "@" + rawUsername.substring(0, 5) + "...";

     let balance = localStorage.getItem('user_balance') !== null ? parseFloat(localStorage.getItem('user_balance')) : 100.00;
     document.getElementById('balance-display').innerText = balance.toFixed(2);

     const ROCKET_URLS = [
         "https://i.postimg.cc/PxbfNvqk/animation-gif-ezgif-com-effects.gif",
         "https://i.postimg.cc/4ynpR8m1/lv-0-20260527162334-ezgif-com-effects.gif"
     ];
     let selectedRocketIndex = parseInt(localStorage.getItem('user_rocket_choice') || 0);

     function selectRocket(index) {
         selectedRocketIndex = index;
         localStorage.setItem('user_rocket_choice', index);
         document.getElementById('rocket-animation').src = ROCKET_URLS[index];
         const options = document.querySelectorAll('.rocket-option');
         options.forEach(opt => opt.classList.remove('active'));
         if (options[index]) options[index].classList.add('active');
     }
     selectRocket(selectedRocketIndex);

     document.querySelectorAll('.nav-item').forEach(b => {
         b.onclick = () => {
             document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
             document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
             b.classList.add('active');
             document.getElementById(b.getAttribute('data-target')).classList.add('active');
         }
     });

     // === ИГРОВЫЕ ПЕРЕМЕННЫЕ И СОКЕТ ===
     const socket = io('https://rdo-0y8m.onrender.com', {
         transports: ['websocket', 'polling'],
         reconnection: true,
         reconnectionAttempts: Infinity,
         reconnectionDelay: 1000,
         timeout: 20000,
         secure: true,
         autoConnect: false // ВАЖНО: Отключаем автоконнект, чтобы успеть повесить слушатели!
     }); 

     // Сразу вешаем обработчик онлайна ДО того, как сокет подключится
     socket.on('updateOnline', (count) => { 
         let parsed = parseInt(count);
         if (!isNaN(parsed) && parsed > 0) {
             document.getElementById('online-count').innerText = parsed; 
         } else {
             // Защита: если сервер прислал пустышку, ставим 1 (так как вы сами онлайн)
             document.getElementById('online-count').innerText = "1";
         }
     });

     let currentBet = 0;
     let isPlaying = false;
     let currentMult = 1.00;
     let explosionVibrated = false;
     let userCashedOut = false;
     let userWinAmount = 0;
     let lastCountdownNum = 0;
     
     // Серверные переменные
     let currentPhase = 'wait'; 
     let phaseStartTime = Date.now();
     let targetCrashMult = 1.00;
     let otherBets = [];

     const explosionSound = new Audio('https://limewire.com/d/Y5QPU#sHnn64dS9E');
     const betInput = document.getElementById('bet-amount');
     const betBtn = document.getElementById('bet-btn');

     // === ЛОГИКА СИНХРОНИЗАЦИИ ===
     socket.on('gameSync', (data) => {
         let prevPhase = currentPhase;
         
         currentPhase = data.phase;
         phaseStartTime = Date.now() - (data.elapsed || 0);
         if (data.targetMultiplier !== undefined) targetCrashMult = parseFloat(data.targetMultiplier);

         if (currentPhase === 'wait' && prevPhase !== 'wait') {
             explosionVibrated = false;
             userCashedOut = false; 
             userWinAmount = 0; 
             if (!isPlaying) currentBet = 0;
             
             const list = document.getElementById('bets-list-container');
             while (list.children.length > 1) { list.removeChild(list.lastChild); }
             otherBets = [];
         }
     });

     // === ЛОГИКА СТАВОК ===
     function processBetAction() {
         if (!isPlaying) {
             let rawInput = document.getElementById('bet-amount').value.trim();
             if (rawInput.endsWith('.') || rawInput === "") { showToast("Ошибка!"); return; }
             let amount = parseFloat(rawInput);
             if (isNaN(amount) || amount < 0.1 || amount > 100) { showToast("Ограничение 0.1-100!"); return; }
             if (amount > balance) return;
             
             currentBet = amount; 
             balance -= amount;
             localStorage.setItem('user_balance', balance.toFixed(2));
             document.getElementById('balance-display').innerText = balance.toFixed(2);
             
             socket.emit('bet', { username: rawUsername, amount: currentBet, avatarLetter: userLetter });
             
             isPlaying = true; 
             userCashedOut = false; 
             userWinAmount = 0; 
             betBtn.innerText = "Забрать"; 
             betBtn.classList.add('cashout'); 
             showToast("Ставка сделана!");
         } else {
             userWinAmount = currentBet * currentMult; 
             balance += userWinAmount; 
             localStorage.setItem('user_balance', balance.toFixed(2));
             document.getElementById('balance-display').innerText = balance.toFixed(2);
             
             socket.emit('cashOut', { username: rawUsername, winAmount: userWinAmount, mult: currentMult });
             
             isPlaying = false; 
             userCashedOut = true; 
             betBtn.innerText = "Поставить"; 
             betBtn.classList.remove('cashout'); 
             showToast("Ставка выведена");
         }
     }

     function handleIncomingBet(data) {
         if (!data) return;
         if (typeof data === 'string') { try { data = JSON.parse(data); } catch (e) { return; } }
         let username = data.username || data.user || data.name || "Игрок";
         let amount = parseFloat(data.amount || data.bet || data.value || 0);
         let avatarLetter = data.avatarLetter || data.avatar || username.charAt(0).toUpperCase() || "?";
         if (username === rawUsername && rawUsername !== "Гость") return;
         
         const list = document.getElementById('bets-list-container');
         const row = document.createElement('div');
         row.className = 'bet-row';
         row.innerHTML = `
             <div class="bet-user-meta">
                 <div class="bet-avatar">${avatarLetter || '?'}</div>
                 <div class="bet-info">
                     <div class="bet-username">@${username}</div>
                     <div class="bet-amount-val">${amount.toFixed(2)} TON</div>
                 </div>
             </div>
             <div class="bet-live-payout">0.00 TON</div>
         `;
         list.appendChild(row);
         otherBets.push({ username: username, amount: amount, element: row.querySelector('.bet-live-payout'), isCashedOut: false });
     }

     function handleIncomingCashout(data) {
         if (!data) return;
         if (typeof data === 'string') { try { data = JSON.parse(data); } catch (e) { return; } }
         let username = data.username || data.user || data.name;
         otherBets.forEach(b => {
             if (b.username === username && !b.isCashedOut) {
                 b.isCashedOut = true;
                 b.element.innerText = (data.winAmount || (b.amount * currentMult)).toFixed(2) + " TON";
                 b.element.style.color = "var(--green-color)";
             }
         });
     }

     socket.on('newBet', handleIncomingBet);
     socket.on('bet', handleIncomingBet);
     socket.on('cashOut', handleIncomingCashout);
     socket.on('cashout', handleIncomingCashout);

     // === СЕТЕВЫЕ СОБЫТИЯ ===
     function handleDisconnectCashout() {
         const badConnSwitch = document.getElementById('bad-conn-switch');
         if (badConnSwitch && badConnSwitch.classList.contains('on')) {
             if (isPlaying && currentPhase === 'flight') {
                 userWinAmount = currentBet * currentMult; 
                 balance += userWinAmount; 
                 localStorage.setItem('user_balance', balance.toFixed(2));
                 document.getElementById('balance-display').innerText = balance.toFixed(2);
                 socket.emit('cashOut', { username: rawUsername, winAmount: userWinAmount, mult: currentMult });
                 isPlaying = false; 
                 userCashedOut = true; 
                 betBtn.innerText = "Поставить"; 
                 betBtn.classList.remove('cashout'); 
                 showToast("Авто-вывод при потере связи!");
             }
         }
     }

     socket.on('connect', () => { 
         showToast("✅ Подключено!"); 
         // Защита №2: принудительное обновление онлайна, если пакет "проскочил"
         let currentCount = parseInt(document.getElementById('online-count').innerText);
         if (isNaN(currentCount) || currentCount === 0) {
             document.getElementById('online-count').innerText = "1";
         }
     });
     socket.on('disconnect', () => { showToast("❌ Потеряно соединение"); handleDisconnectCashout(); });
     window.addEventListener('offline', () => { showToast("❌ Нет интернета"); handleDisconnectCashout(); });

     // ВСЕ слушатели назначены, ТЕПЕРЬ даем команду на подключение к серверу
     socket.connect();

     // === ИГРОВОЙ ЦИКЛ (ОТРИСОВКА) ===
     const crashCanvas = document.getElementById('crash-canvas');
     const gridCanvas = document.getElementById('grid-canvas');
     const ctx = crashCanvas.getContext('2d');
     const gCtx = gridCanvas.getContext('2d');
     const multiplierEl = document.getElementById('crash-multiplier');
     const statusEl = document.getElementById('crash-status');
     const rocketAnim = document.getElementById('rocket-animation');
     const historyContainer = document.getElementById('crash-history');
     const countdownOverlay = document.getElementById('countdown-overlay');

     function loop() {
         crashCanvas.width = gridCanvas.width = crashCanvas.parentElement.clientWidth;
         crashCanvas.height = gridCanvas.height = crashCanvas.parentElement.clientHeight;
         ctx.clearRect(0, 0, crashCanvas.width, crashCanvas.height);
         gCtx.clearRect(0, 0, gridCanvas.width, gridCanvas.height);

         // Отрисовка сетки
         let pulseOffset = Math.sin(Date.now() / 300) * (currentMult * 5); 
         gCtx.strokeStyle = 'rgba(157, 78, 221, 0.3)';
         gCtx.lineWidth = 1;
         let spacing = 40;
         for (let i = -spacing + pulseOffset; i < gridCanvas.width; i += spacing) {
             gCtx.beginPath(); gCtx.moveTo(i, 0); gCtx.lineTo(i, gridCanvas.height); gCtx.stroke();
         }
         for (let i = 0; i < gridCanvas.height; i += spacing) {
             gCtx.beginPath(); gCtx.moveTo(0, i); gCtx.lineTo(gridCanvas.width, i); gCtx.stroke();
         }

         let now = Date.now();
         let timeElapsed = now - phaseStartTime;

         // Логика фаз диктуется сервером
         if (currentPhase === 'wait') {
             // 5000ms = 5 sec wait time
             let secondsRemaining = Math.ceil((5000 - timeElapsed) / 1000);
             if (secondsRemaining > 0 && secondsRemaining <= 5) {
                 if (secondsRemaining !== lastCountdownNum) {
                     lastCountdownNum = secondsRemaining;
                     countdownOverlay.innerText = secondsRemaining;
                     countdownOverlay.style.display = 'block';
                     countdownOverlay.classList.remove('pop-anim');
                     void countdownOverlay.offsetWidth; 
                     countdownOverlay.classList.add('pop-anim');
                 }
             } else {
                 countdownOverlay.style.display = 'none';
             }

             statusEl.style.visibility = 'hidden';
             multiplierEl.style.visibility = 'hidden';
             currentMult = 1.00;
             rocketAnim.style.visibility = 'hidden';
             betInput.disabled = false;
             betBtn.style.display = 'inline-block';
             if (!isPlaying) betBtn.disabled = false;

         } else if (currentPhase === 'flight') {
             statusEl.style.visibility = 'visible';
             multiplierEl.style.visibility = 'visible';
             countdownOverlay.style.display = 'none';
             
             // Вычисляем множитель на основе прошедшего времени (синхронизировано с сервером)
             currentMult = Math.pow(1.001, timeElapsed / 20);
             // Ограничитель, чтобы визуал не перескочил цель сервера
             if (currentMult > targetCrashMult) currentMult = targetCrashMult;

             statusEl.innerText = "В полете...";
             multiplierEl.innerText = currentMult.toFixed(2) + "x";
             multiplierEl.style.color = "#fff";
             rocketAnim.style.visibility = 'visible';
             betInput.disabled = true;
             betBtn.style.display = 'inline-block';
             if (isPlaying) betBtn.disabled = false; else betBtn.disabled = true;

         } else if (currentPhase === 'crash') {
             currentMult = targetCrashMult; // Жестко ставим серверную цель
             
             multiplierEl.innerText = currentMult.toFixed(2) + "x";
             statusEl.innerText = "Взрыв!";
             multiplierEl.style.color = "red";
             rocketAnim.style.visibility = 'hidden';
             countdownOverlay.style.display = 'none';
             betInput.disabled = true; 
             betBtn.disabled = true;
             
             if (!explosionVibrated) { 
                 if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy'); 
                 explosionSound.play(); 
                 explosionVibrated = true; 
                 localStorage.setItem('lastMult', currentMult.toFixed(2));
                 
                 // Добавление в историю
                 let item = document.createElement('div');
                 item.className = 'history-item';
                 item.innerText = currentMult.toFixed(2) + "x";
                 
                 if (currentMult <= 1.20) { item.style.borderColor = 'red'; item.style.backgroundColor = 'rgba(255, 0, 0, 0.2)'; }
                 else if (currentMult <= 1.50) { item.style.borderColor = 'yellow'; item.style.backgroundColor = 'rgba(255, 255, 0, 0.2)'; }
                 else { item.style.borderColor = 'var(--green-color)'; item.style.backgroundColor = 'rgba(40, 167, 69, 0.2)'; }
                 
                 historyContainer.insertBefore(item, historyContainer.firstChild);
                 if (historyContainer.children.length > 10) historyContainer.removeChild(historyContainer.lastChild);
                 
                 // Если игрок не успел вывести деньги
                 if (isPlaying) { 
                     isPlaying = false; 
                     betBtn.innerText = "Поставить"; 
                     betBtn.classList.remove('cashout'); 
                 }
             }
         }

         // === ОБНОВЛЕНИЕ UI СТАВОК ===
         const uBetEl = document.getElementById('user-bet-amount');
         const uPayoutEl = document.getElementById('user-bet-payout');
         if (isPlaying) { 
             uBetEl.innerText = currentBet.toFixed(2) + " TON"; 
             uPayoutEl.innerText = (currentBet * currentMult).toFixed(2) + " TON"; 
             uPayoutEl.style.color = "var(--green-color)"; 
         } else if (userCashedOut) { 
             uBetEl.innerText = currentBet.toFixed(2) + " TON"; 
             uPayoutEl.innerText = userWinAmount.toFixed(2) + " TON"; 
             uPayoutEl.style.color = "var(--green-color)"; 
         } else if (currentPhase === 'crash' && currentBet > 0) { 
             uBetEl.innerText = currentBet.toFixed(2) + " TON"; 
             uPayoutEl.innerText = "0.00 TON"; 
             uPayoutEl.style.color = "#ff4d4d"; 
         } else { 
             uBetEl.innerText = currentBet > 0 ? currentBet.toFixed(2) + " TON" : "0.00 TON"; 
             uPayoutEl.innerText = "0.00 TON"; 
             uPayoutEl.style.color = 'var(--text-muted)'; 
         }

         otherBets.forEach(b => { 
             if (b.isCashedOut) return; 
             if (currentPhase === 'flight') { 
                 b.element.innerText = (b.amount * currentMult).toFixed(2) + " TON"; 
                 b.element.style.color = "var(--green-color)"; 
             } else if (currentPhase === 'crash') { 
                 b.element.innerText = "0.00 TON"; 
                 b.element.style.color = "#ff4d4d"; 
             } 
         });
         
         requestAnimationFrame(loop);
     }
     
     // Запуск цикла
     loop();
 </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Crash Game</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 80%; height: 60%; border-bottom: 2px solid #555; border-left: 2px solid #555; display: flex; align-items: flex-end; }
        #multiplier { font-size: 4rem; font-weight: bold; margin-bottom: 20px; color: #00ff00; }
        .controls { margin-top: 20px; }
        button { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 5px; background: #444; color: white; }
        button:hover { background: #666; }
        .bg-characters { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: 50px; opacity: 0.1; z-index: 0; pointer-events: none; }
        #status { margin-top: 10px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="multiplier">1.00x</div>
    <div id="game-container"></div>
    <div id="status">Нажмите кнопку, чтобы начать</div>

    <div class="controls">
        <button onclick="startGame()">Старт</button>
        <button onclick="stopGame()">Стоп</button>
    </div>

    <script>
        let mult = 1.00;
        let gameActive = false;
        let multiplierEl = document.getElementById('multiplier');
        let statusEl = document.getElementById('status');

        function startGame() {
            if (gameActive) return;
            gameActive = true;
            mult = 1.00;
            statusEl.innerText = "Игра идет...";
            loop();
        }

        function stopGame() {
            gameActive = false;
            statusEl.innerText = "Вы остановили на " + mult.toFixed(2) + "x";
        }

        function loop() {
            if (!gameActive) return;

            mult += 0.01;
            multiplierEl.innerText = mult.toFixed(2) + "x";

            // Логика краша (шанс 5% на каждом шаге)
            if (Math.random() < 0.05) {
                gameActive = false;
                multiplierEl.style.color = "red";
                statusEl.innerText = "КРАШ! Вы проиграли.";
                setTimeout(() => {
                    multiplierEl.style.color = "#00ff00";
                }, 2000);
                return;
            }

            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
